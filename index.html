<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurator API YouTube</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>YouTube Kurator</h2>

    <div class="search-box">
        <p class="api-status">
            Sistem Kurasi Otomatis (API Status: <span class="status-dot">●</span> Connected)
        </p>
        
        <input type="text" id="keyword" placeholder="Mau belajar topik apa hari ini?"> 
        
        <div class="filter-group">
            <select id="lang">
                <option value="id">Bahasa Indonesia</option>
                <option value="en">Bahasa Inggris</option>
            </select>

            <select id="dur">
                <option value="any">Semua Durasi</option>
                <option value="short">Singkat (< 4 mnt)</option>
                <option value="medium">Sedang (4-20 mnt)</option>
            </select>

            <button onclick="mulaiPencarian()" id="btn-search">CARI TUTORIAL</button>
        </div>
    </div>

    <div id="video-display" class="video-grid"></div>
</div>

<div id="modal">
    <div class="modal-content">
        <span class="close" onclick="tutupVideo()">&times;</span>
        <div id="player"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
